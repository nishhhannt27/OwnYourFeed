<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{width:320px;font-family:"Segoe UI",system-ui,sans-serif;background:#0f172a;color:#e2e8f0;overflow:hidden}
    .hdr{padding:20px 20px 14px;background:linear-gradient(135deg,#0f172a,#1a1a2e);border-bottom:1px solid rgba(255,255,255,.06)}
    .hdr-row{display:flex;align-items:center;justify-content:space-between}
    .logo{display:flex;align-items:center;gap:10px}
    .logo-i{width:38px;height:38px;background:linear-gradient(135deg,#f59e0b,#ef4444);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 12px rgba(245,158,11,.3)}
    .logo-t{font-size:15px;font-weight:800;letter-spacing:-.02em}
    .logo-s{font-size:11px;color:#64748b;margin-top:1px}
    .sw{position:relative;width:44px;height:24px;flex-shrink:0}
    .sw input{display:none}
    .sl{position:absolute;inset:0;background:#334155;border-radius:12px;cursor:pointer;transition:background .3s}
    .sl::after{content:"";position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .3s}
    .sw input:checked+.sl{background:#10b981}
    .sw input:checked+.sl::after{transform:translateX(20px)}
    .st{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;margin-top:12px;padding:5px 10px;border-radius:20px;letter-spacing:.03em}
    .st.on{background:rgba(16,185,129,.12);color:#34d399}
    .st.off{background:rgba(239,68,68,.12);color:#f87171}
    .st-d{width:6px;height:6px;border-radius:50%;background:currentColor}
    .sec{padding:14px 20px}
    .sec-t{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#64748b;margin-bottom:10px}
    .cat{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:8px;margin-bottom:5px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);transition:background .2s}
    .cat:hover{background:rgba(255,255,255,.06)}
    .cat-l{display:flex;align-items:center;gap:10px}
    .cat-i{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
    .cat-i.g{background:rgba(16,185,129,.15)}.cat-i.c{background:rgba(59,130,246,.15)}.cat-i.p{background:rgba(245,158,11,.15)}
    .cat-n{font-size:13px;font-weight:600}
    .cat-c{font-size:11px;color:#64748b}
    .qb{padding:10px 20px 14px;border-top:1px solid rgba(255,255,255,.04)}
    .qbox{padding:11px;border-radius:8px;background:rgba(245,158,11,.06);border-left:3px solid #f59e0b}
    .qt{font-size:12px;font-style:italic;color:#fbbf24;line-height:1.4}
    .qa{font-size:11px;color:#92703a;margin-top:3px;font-weight:600}
    .ft{padding:8px 20px 12px;text-align:center;border-top:1px solid rgba(255,255,255,.04)}
    .ft-t{font-size:11px;color:#475569}
  </style>
</head>
<body>
  <div class="hdr">
    <div class="hdr-row">
      <div class="logo">
        <div class="logo-i">⚡</div>
        <div><div class="logo-t">OwnYourFeed</div><div class="logo-s">Control Your Feed</div></div>
      </div>
      <label class="sw"><input type="checkbox" id="mt" checked><span class="sl"></span></label>
    </div>
    <div class="st on" id="sp"><span class="st-d"></span><span id="stx">Focus Mode Active</span></div>
  </div>
  <div class="sec">
    <div class="sec-t">Content Categories</div>
    <div class="cat"><div class="cat-l"><div class="cat-i g">🧠</div><div><div class="cat-n">Growth Mindset</div><div class="cat-c">13 topics</div></div></div><label class="sw"><input type="checkbox" id="tg" checked><span class="sl"></span></label></div>
    <div class="cat"><div class="cat-l"><div class="cat-i c">💻</div><div><div class="cat-n">Coding</div><div class="cat-c">12 topics</div></div></div><label class="sw"><input type="checkbox" id="tc" checked><span class="sl"></span></label></div>
    <div class="cat"><div class="cat-l"><div class="cat-i p">🛡️</div><div><div class="cat-n">CompTIA</div><div class="cat-c">9 topics</div></div></div><label class="sw"><input type="checkbox" id="tp" checked><span class="sl"></span></label></div>
  </div>
  <div class="qb"><div class="qbox"><div class="qt" id="qt"></div><div class="qa" id="qa"></div></div></div>
  <div class="ft"><div class="ft-t">Reload YouTube tab after toggling</div></div>
  <script src="popup.js"></script>
</body>
</html>
